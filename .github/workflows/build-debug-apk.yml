name: Build Debug APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── QNN SDK ──────────────────────────────────────────────────────────────────
  # v2.28 (qualcomm_neural_processing_sdk) used a flat SampleApp layout and
  # omitted the per-Hexagon-version stub libs. The current CMakeLists.txt
  # expects the v2.39 (Qualcomm_AI_Runtime_Community) layout that ships:
  #   examples/QNN/SampleApp/SampleApp/   ← nested subfolder
  #   lib/aarch64-android/libQnnHtpV81Stub.so
  #   lib/hexagon-v81/unsigned/libQnnHtpV81*.so
  QNN_SDK_VERSION: "v2.39.0.250926"
  QNN_SDK_URL: "https://apigwx-aws.qualcomm.com/qsc/public/v1/api/download/software/sdks/Qualcomm_AI_Runtime_Community/All/2.39.0.250926/v2.39.0.250926.zip"

  # ── Toolchain ────────────────────────────────────────────────────────────────
  # Pinned to 3.28.x — CMake 3.31 introduced CMP0175 which turns the
  # POST_BUILD keyword inside add_custom_command(OUTPUT …) from a warning into
  # an error, breaking tokenizers-cpp/msgpack.
  CMAKE_PINNED_VERSION: "3.28.6"
  RUST_VERSION: "1.84.0"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Java ────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ── 3. Rust ────────────────────────────────────────────────────────────
      - name: Set up Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-rust-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_VERSION }}-

      # ── 4. System build tools ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build unzip wget dos2unix python3

      - name: Install pinned CMake ${{ env.CMAKE_PINNED_VERSION }}
        run: |
          CMAKE_VER="${{ env.CMAKE_PINNED_VERSION }}"
          wget -q \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-linux-x86_64.tar.gz" \
            -O /tmp/cmake-pinned.tar.gz
          sudo tar -xzf /tmp/cmake-pinned.tar.gz -C /opt/
          echo "/opt/cmake-${CMAKE_VER}-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Verify CMake version
        run: cmake --version

      # ── 5. Android NDK ────────────────────────────────────────────────────
      # We do NOT use nttld/setup-ndk: its actions/cache restore step doesn't
      # reliably preserve dangling symlinks (clang → clang-N), which makes
      # cmake report "compiler is not a full path to an existing tool".
      #
      # Instead we use the NDK already pre-installed on the ubuntu-latest
      # runner ($ANDROID_SDK_ROOT/ndk/), and fall back to a direct Google
      # download only if none is present or clang is missing.
      - name: Locate or download Android NDK
        id: ndk
        run: |
          CLANG_REL="toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          NDK_ROOT=""

          # ── attempt 1: runner pre-installed NDK ──────────────────────────
          if [ -d "$SDK_ROOT/ndk" ]; then
            NDK_ROOT=$(ls -d "$SDK_ROOT/ndk"/* 2>/dev/null | sort -V | tail -1)
          fi

          if [ -n "$NDK_ROOT" ] && [ -f "$NDK_ROOT/$CLANG_REL" ]; then
            echo "Using pre-installed NDK: $NDK_ROOT"
          else
            echo "Pre-installed NDK not usable — downloading r27c from Google..."
            DEST="$HOME/android-ndk-dl"
            mkdir -p "$DEST"
            wget -q --tries=3 --timeout=180 \
              "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip" \
              -O /tmp/android-ndk.zip
            unzip -q /tmp/android-ndk.zip -d "$DEST"
            rm /tmp/android-ndk.zip
            NDK_ROOT=$(find "$DEST" -maxdepth 1 -mindepth 1 -type d | head -1)
          fi

          # ── verify ───────────────────────────────────────────────────────
          if [ ! -f "$NDK_ROOT/$CLANG_REL" ]; then
            echo "ERROR: clang not found after setup. bin/ contents:"
            ls "$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep -i clang || true
            exit 1
          fi
          echo "NDK clang OK: $NDK_ROOT/$CLANG_REL"
          echo "ndk_root=$NDK_ROOT"          >> "$GITHUB_OUTPUT"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT"  >> "$GITHUB_ENV"
          echo "ANDROID_NDK=$NDK_ROOT"       >> "$GITHUB_ENV"

      # ── 6. QNN SDK ────────────────────────────────────────────────────────
      - name: Cache QNN SDK
        id: cache-qnn
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/qnn_sdk
          key: qnn-sdk-${{ env.QNN_SDK_VERSION }}

      - name: Download and extract QNN SDK
        if: steps.cache-qnn.outputs.cache-hit != 'true'
        run: |
          echo "Downloading QNN SDK ${{ env.QNN_SDK_VERSION }} ..."
          wget --no-verbose --tries=3 --timeout=180 \
               "${{ env.QNN_SDK_URL }}" -O qnn_sdk.zip
          mkdir -p qnn_sdk
          unzip -q qnn_sdk.zip -d qnn_sdk
          rm -f qnn_sdk.zip

      - name: Resolve QNN SDK root and validate required paths
        run: |
          # Walk the tree to find the directory that owns 'lib' and 'include'
          QNN_ROOT=$(find "${{ github.workspace }}/qnn_sdk" \
                     -maxdepth 5 \
                     -type d -name "include" \
                     | xargs -I{} dirname {} \
                     | while read d; do
                         [ -d "$d/lib" ] && echo "$d" && break
                       done)

          if [ -z "$QNN_ROOT" ]; then
            echo "ERROR: Cannot resolve QNN SDK root. Dumping tree:"
            find "${{ github.workspace }}/qnn_sdk" -maxdepth 5 | head -80
            exit 1
          fi
          echo "QNN SDK root: $QNN_ROOT"
          echo "QNN_SDK_ROOT=$QNN_ROOT" >> "$GITHUB_ENV"

          # ── Validate the three paths that CMakeLists.txt hard-requires ────
          MISSING=0
          check() {
            if [ ! -e "$QNN_ROOT/$1" ]; then
              echo "MISSING: $QNN_ROOT/$1"
              MISSING=1
            else
              echo "OK:      $QNN_ROOT/$1"
            fi
          }
          check "examples/QNN/SampleApp/SampleApp"
          check "lib/aarch64-android/libQnnHtpV81Stub.so"
          check "lib/hexagon-v81/unsigned/libQnnHtpV81.so"
          check "lib/hexagon-v81/unsigned/libQnnHtpV81Skel.so"

          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "One or more required SDK paths are missing."
            echo "Showing actual SDK tree (lib/ and examples/):"
            find "$QNN_ROOT/lib"      -maxdepth 3 | sort | head -60 || true
            find "$QNN_ROOT/examples" -maxdepth 4 | sort | head -40 || true
            exit 1
          fi

      # ── 7. Patch config files ──────────────────────────────────────────────
      - name: Patch QNN_SDK_ROOT and ANDROID_NDK_ROOT into config files
        run: |
          python3 - << 'PYEOF'
          import re, pathlib, os, sys

          qnn_root = os.environ["QNN_SDK_ROOT"]
          ndk_root = os.environ["ANDROID_NDK_ROOT"]

          cmake_file = pathlib.Path("app/src/main/cpp/CMakeLists.txt")
          if cmake_file.exists():
              text = cmake_file.read_text()
              original = text
              text = re.sub(
                  r'set\s*\(\s*QNN_SDK_ROOT\s+[^)]+\)',
                  f'set(QNN_SDK_ROOT "{qnn_root}")',
                  text
              )
              cmake_file.write_text(text)
              changed = text != original
              status = "patched OK" if changed else "WARNING — pattern not found, check manually"
              print(f"CMakeLists.txt: {status}")
              for i, line in enumerate(text.splitlines(), 1):
                  if "QNN_SDK_ROOT" in line:
                      print(f"  line {i}: {line.strip()}")
          else:
              print("WARNING: CMakeLists.txt not found", file=sys.stderr)

          presets_file = pathlib.Path("app/src/main/cpp/CMakePresets.json")
          if presets_file.exists():
              text = presets_file.read_text()
              original = text
              text = re.sub(
                  r'"ANDROID_NDK_ROOT"\s*:\s*"[^"]*"',
                  f'"ANDROID_NDK_ROOT": "{ndk_root}"',
                  text
              )
              presets_file.write_text(text)
              changed = text != original
              status = "patched OK" if changed else "WARNING — pattern not found, check manually"
              print(f"CMakePresets.json: {status}")
              for i, line in enumerate(text.splitlines(), 1):
                  if "ANDROID_NDK_ROOT" in line:
                      print(f"  line {i}: {line.strip()}")
          else:
              print("WARNING: CMakePresets.json not found", file=sys.stderr)
          PYEOF

      # ── 8. Patch build.sh for cmake compatibility ──────────────────────────
      - name: Patch build.sh for cmake policy compatibility
        run: |
          BUILD_SH="app/src/main/cpp/build.sh"
          if [ -f "$BUILD_SH" ]; then
            sed -i 's/cmake \([^-]\)/cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \1/g' "$BUILD_SH"
            echo "cmake invocations after patch:"
            grep "cmake " "$BUILD_SH" | head -10
          fi

      # ── 9. Build native C++ libraries ──────────────────────────────────────
      - name: Build native libraries (build.sh)
        working-directory: app/src/main/cpp
        env:
          QNN_SDK_ROOT:     ${{ env.QNN_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_ROOT }}
        run: |
          chmod +x build.sh
          bash ./build.sh

      # ── 10. Build Debug APK ────────────────────────────────────────────────
      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 11. Upload artifacts ───────────────────────────────────────────────
      - name: Upload Debug APK(s)
        uses: actions/upload-artifact@v4
        with:
          name: local-dream-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── 12. Build summary ──────────────────────────────────────────────────
      - name: Write build summary
        if: always()
        run: |
          echo "## Build Summary"                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |"                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |"                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |"                      >> "$GITHUB_STEP_SUMMARY"
          echo "| CMake | \`${{ env.CMAKE_PINNED_VERSION }}\` (pinned) |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| QNN SDK | \`${{ env.QNN_SDK_VERSION }}\` |"                 >> "$GITHUB_STEP_SUMMARY"
          echo "| NDK | \`${{ steps.ndk.outputs.ndk_root }}\` |"              >> "$GITHUB_STEP_SUMMARY"
          echo "| Rust | \`${{ env.RUST_VERSION }}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                              >> "$GITHUB_STEP_SUMMARY"
          echo "### APK outputs"                                               >> "$GITHUB_STEP_SUMMARY"
          find app/build/outputs/apk -name "*.apk" 2>/dev/null \
            | while read -r f; do
                size=$(du -h "$f" | cut -f1)
                echo "- \`$(basename "$f")\` (${size})" >> "$GITHUB_STEP_SUMMARY"
              done \
            || echo "_No APKs found_" >> "$GITHUB_STEP_SUMMARY"
